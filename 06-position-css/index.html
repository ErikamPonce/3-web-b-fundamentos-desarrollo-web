<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stardew Valley Farm</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <nav class="navbar">
        <a href="#">🏡 Inicio</a>
        <a href="#">🌾 Cultivos</a>
        <a href="#">🐓 Animales</a>
        <a href="#">📩 Contacto</a>
      </nav>
    </header>

    <div class="game-container">
      <img src="./img/stardewvalley.jpg" class="bg-game" />
      <div class="close">❌</div>
      <h1 class="game-title">STARDEW FARM</h1>

      <!-- elementos decorativos (sustitutos por figuras) -->
      <div class="item item-1">🌻</div>
      <div class="item item-2">🐔</div>
      <button class="btn-play">🌱 Comenzar Día</button>
      <div class="btn-config-game">
        <button>🎒</button>
        <button class="btn-world">🗺</button>
        <button>⚙</button>
      </div>
    </div>

    <div class="cookie-footer">
      <p>Este sitio usa cookies para mejorar tu granja digital.</p>
      <button>Aceptar</button>
    </div>
  </body>
</html>
