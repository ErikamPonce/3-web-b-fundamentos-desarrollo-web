<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position CSS</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- header -->
    <header>
        <nav class="navbar">
            <a href="#home">Inicio</a>
            <a href="#services">Servicios</a>
            <a href="#about">Nosotros</a>
            <a href="#contact">Contacto</a>
        </nav>
    </header>  

    <!-- Escena del juego -->
    <div class="game-container">
        <img src="./img/fondo.jpg" alt="angry-birds-video-games" class="bg-game">
        <img src="#" alt="">
        <div class="equis">✖️</div>
        <h1 class="game-title">ANGRY BIRDS</h1>
        <div class="bird bird-1"></div>
        <div class="bird bird-2"></div>
        <button class="btn-play">Play</button>
        <div class="btn-config-game">
            <button class="btn-setting">🔩</button>
            <button class="btn-world">🌐</button>
            <button class="btn-menu">☰</button>
        </div>
    </div>

    <!-- Footer de Cookies -->
    <div class="cookie-footer">
        <p>Este sitio utiliza cookies para mejorar la experiencia. <a href="#cookies-policy">Más información</a>.</p>
        <button class="cookie-accept">Aceptar</button>
    </div>
</body>
</html>
